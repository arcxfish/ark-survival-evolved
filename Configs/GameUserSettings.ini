[ServerSettings]
# --- マップ・視点・HUD設定 ---
ShowMapPlayerLocation=True               # マップ上に自分の現在地を表示する
AllowThirdPersonPlayer=True              # 三人称視点を許可する
ServerCrosshair=True                     # レティクル（照準）を表示する
AllowHitMarkers=True                     # ヒットマーカーを表示する

# --- セキュリティ・管理設定 ---
ServerPassword=itl3                      # サーバーへの接続パスワード
ServerAdminPassword=itl3admin            # 管理者コマンド用パスワード
RCONPort=27020                           # 遠隔管理（RCON）用ポート番号
RCONServerGameLogBuffer=600.000000       # RCONログのバッファサイズ

# --- 構造物・建築設定 ---
TheMaxStructuresInRange=10500.000000      # 一定範囲内に設置可能な最大構造物数
StructurePreventResourceRadiusMultiplier=1.000000 # 建築物による資源再生阻害範囲の倍率
PlatformSaddleBuildAreaBoundsMultiplier=6.000000 # プラットフォームサドルの建築制限範囲の倍率
PerPlatformMaxStructuresMultiplier=6.000000 # プラットフォーム上の最大建築数倍率
StructurePickupTimeAfterPlacement=60.000000 # 設置後、アイテムとして回収可能な秒数
StructurePickupHoldDuration=0.500000     # 回収時の長押し時間
AllowIntegratedSPlusStructures=True      # S+（Structures Plus）機能を統合するか（ASE後半の実装機能）

#--- プレイヤー・恐竜のステータス倍率 ---
OxygenSwimSpeedStatMultiplier=1.000000   # 酸素量による泳ぎ速度上昇の倍率
PlayerCharacterFoodDrainMultiplier=0.700000    # プレイヤーの食料消費速度（低いほど減りにくい）
PlayerCharacterWaterDrainMultiplier=0.700000   # プレイヤーの水分消費速度（低いほど減りにくい）
PlayerCharacterStaminaDrainMultiplier=0.900000 # プレイヤーのスタミナ消費速度
PlayerCharacterHealthRecoveryMultiplier=1.400000 # プレイヤーの体力回復速度
RaidDinoCharacterFoodDrainMultiplier=1.000000  # レイド用恐竜（チタノ等）の食料消費速度

# --- サーバー運用ルール ---
TribeNameChangeCooldown=15.000000        # トライブ名変更のクールダウン時間
PvEDinoDecayPeriodMultiplier=1.000000    # PvEでの恐竜の放置消滅までの時間倍率
KickIdlePlayersPeriod=3600.000000        # 放置プレイヤーをキックするまでの時間（秒）
AutoSavePeriodMinutes=15.000000          # オートセーブの間隔（分）
MaxTamedDinos=1000.000000                # サーバー全体でテイム可能な最大恐竜数
ItemStackSizeMultiplier=4.000000         # アイテムスタック数の倍率
GreaterRiftActivationMultiplier=1.000000 # 特定イベントやMODの有効化倍率
ShowAnniversaryContent=True              # アニバーサリーイベント内容を表示
AllowHideDamageSourceFromLogs=True       # ログからダメージソースを隠すことを許可

# --- その他 ---
ListenServerTetherDistanceMultiplier=1.000000 # 非専用サーバー時のホストとの距離制限（テザー距離）
ActiveMods=889745138                     # 有効なMODのIDリスト

[/Script/ShooterGame.ShooterGameUserSettings]
# --- 音量設定 ---
MasterAudioVolume=1.000000               # 全体の音量
MusicAudioVolume=1.000000                # BGMの音量
SFXAudioVolume=1.000000                  # 効果音の音量
VoiceAudioVolume=2.000000                # ボイスチャットの音量
CharacterAudioVolume=1.000000            # キャラクターボイスの音量
AmbientSoundVolume=1.000000              # 環境音の音量
DisableMenuMusic=True                    # メニューBGMを無効にするか

# --- UI・表示設定 ---
UIScaling=1.000000                       # UI全体のサイズ
UIQuickbarScaling=0.650000               # クイックバーのサイズ
FOVMultiplier=1.000000                   # 視野角（FOV）倍率
CameraShakeScale=0.250000                # カメラの揺れの強さ
bFloatingNames=True                      # キャラクター名の浮遊表示
bChatBubbles=True                        # チャット吹き出しの表示
HideItemTextOverlay=True                 # アイテムのテキストオーバーレイを隠す
bQuickToggleItemNames=True               # Qキーなどでのアイテム名切り替え有効化
bEnableInventoryItemTooltips=True        # インベントリ内のツールチップ表示
bNoTooltipDelay=False                    # ツールチップ表示の遅延をなくす
bToggleExtendedHUDInfo=False             # Hキーの拡張情報をトグルにするか

# --- グラフィックス・エフェクト設定 ---
GraphicsQuality=1                        # 全体的なグラフィック品質 (1=低, 2=中, 3=高)
GroundClutterDensity=0.000000            # 地面の草などの密度（0でオフ）
TrueSkyQuality=0.000000                  # 空の描画品質
bFilmGrain=False                         # フィルムグレイン効果
bMotionBlur=False                        # モーションブラー
bUseSSAO=False                           # アンビエントオクルージョン(SSAO)
bDisableBloom=False                      # ブルーム（光があふれる効果）を無効化
bDisableLightShafts=False                # ライトシャフト（光の筋）を無効化
bLowQualityVFX=False                     # 低品質なエフェクトを使用
bLowQualityAnimations=True               # 低品質なアニメーションを使用（負荷軽減）

# --- ゲームプレイ操作設定 ---
bFirstPersonRiding=False                 # 騎乗時に強制的に一人称にするか
bInvertLookY=False                       # マウスの上下反転
LookLeftRightSensitivity=1.000000        # 左右視点感度
LookUpDownSensitivity=1.000000           # 上下視点感度
bUseVSync=False                          # 垂直同期の有効化
ResolutionSizeX=1280                     # 解像度（横）
ResolutionSizeY=720                      # 解像度（縦）
FullscreenMode=2                         # ウィンドウモード (0=フルスクリーン, 1=窓なしフルスクリーン, 2=ウィンドウ)

# --- 連携・反応設定（Genesis以降のコンパニオン等） ---
CompanionReactionVerbosity=3             # HLN-A等の反応頻度
EnableEnvironmentalReactions=True        # 環境変化への反応
EnableRespawnReactions=True              # リスポーン時の反応
EnableDeathReactions=True                # 死亡時の反応

[ScalabilityGroups]
# ハードウェア性能に応じた描画詳細設定; 0=低 - 3=最高
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3                 # 描画距離
sg.AntiAliasingQuality=2                 # アンチエイリアス
sg.ShadowQuality=1                       # 影の品質
sg.PostProcessQuality=3                  # ポストプロセス（後処理）
sg.TextureQuality=2                      # テクスチャ品質
sg.EffectsQuality=2                      # エフェクト品質
sg.GroundClutterQuality=2                # 地面の散らかり（草等）の品質
sg.GroundClutterRadius=8000              # 草等が表示される半径

[SessionSettings]
SessionName=iTL_Server_on_GALLERIA       # サーバーブラウザに表示される名前

[/Script/Engine.GameSession]
MaxPlayers=10                            # サーバーの最大同時接続人数

